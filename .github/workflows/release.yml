name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write   # 允许创建 Release 和上传附件

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set version
      id: ver
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}" -replace '^v', ''
        } else {
            $v = "${{ github.event.inputs.version }}"
        }
        "VERSION=$v" >> $env:GITHUB_OUTPUT
        "TAG=v$v"    >> $env:GITHUB_OUTPUT
        Write-Host "Building PhysiBot $v"

    - name: Init dist dir
      shell: pwsh
      run: |
        $name = "PhysiBot-${{ steps.ver.outputs.VERSION }}"
        New-Item -ItemType Directory -Path "dist\$name\vendor" -Force | Out-Null
        "DIST_NAME=$name"     >> $env:GITHUB_ENV
        "DIST_DIR=dist\$name" >> $env:GITHUB_ENV

    # ── 源码 & 启动脚本 ──────────────────────────────────────
    - name: Copy source files
      shell: pwsh
      run: |
        $d = $env:DIST_DIR
        foreach ($item in @("src","pyproject.toml","uv.lock","run.ps1",
                             "一键启动.bat","start.bat","PhysiBot.cmd",
                             "START_HERE.txt","setup.bat")) {
            if (Test-Path $item) { Copy-Item $item $d -Recurse -Force }
        }
        New-Item -ItemType Directory "$d\scripts" -Force | Out-Null
        foreach ($f in @("bootstrap_and_run.ps1","setup.ps1")) {
            if (Test-Path "scripts\$f") { Copy-Item "scripts\$f" "$d\scripts\" -Force }
        }
        # physi-data 模板（无个人数据）
        New-Item -ItemType Directory "$d\physi-data" -Force | Out-Null
        foreach ($f in @("config.yaml.example","PHYSI.md")) {
            if (Test-Path "physi-data\$f") { Copy-Item "physi-data\$f" "$d\physi-data\" -Force }
        }

    # ── Python 嵌入包 ────────────────────────────────────────
    - name: Download & prepare Python embeddable
      shell: pwsh
      run: |
        $ProgressPreference = "SilentlyContinue"
        $pyDir  = "$env:DIST_DIR\vendor\python-embed"
        $zipTmp = "$env:TEMP\python-embed.zip"
        New-Item -ItemType Directory $pyDir -Force | Out-Null

        Invoke-WebRequest -Uri "https://mirrors.huaweicloud.com/python/3.12.8/python-3.12.8-embed-amd64.zip" `
            -OutFile $zipTmp -UseBasicParsing
        Expand-Archive $zipTmp $pyDir -Force

        # 启用 site-packages（解注释 import site）
        Get-ChildItem $pyDir -Filter "python*._pth" | ForEach-Object {
            (Get-Content $_.FullName -Raw) -replace '#import site','import site' |
                Set-Content $_.FullName -Encoding UTF8
        }

        # 安装 pip
        $getpip = "$env:TEMP\get-pip.py"
        Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile $getpip -UseBasicParsing
        & "$pyDir\python.exe" $getpip --no-warn-script-location -q `
            -i https://pypi.tuna.tsinghua.edu.cn/simple
        if ($LASTEXITCODE -ne 0) { throw "pip install failed" }

        Write-Host "Python embed + pip ready"

    - name: Install project into embedded Python
      shell: pwsh
      run: |
        $ProgressPreference = "SilentlyContinue"
        $pyExe = "$env:DIST_DIR\vendor\python-embed\python.exe"
        $mirror = "https://pypi.tuna.tsinghua.edu.cn/simple"

        # 先装构建后端，再做普通（非 editable）安装
        & $pyExe -m pip install hatchling --no-warn-script-location -q -i $mirror
        if ($LASTEXITCODE -ne 0) { throw "hatchling install failed" }

        & $pyExe -m pip install . --no-warn-script-location -q -i $mirror
        if ($LASTEXITCODE -ne 0) { throw "project install failed" }

        Write-Host "All dependencies installed"

    # ── ActivityWatch ────────────────────────────────────────
    - name: Bundle ActivityWatch
      shell: pwsh
      run: |
        $ProgressPreference = "SilentlyContinue"
        $awDir = "$env:DIST_DIR\vendor\activitywatch"
        $tmp   = "$env:TEMP\aw.zip"
        New-Item -ItemType Directory $awDir -Force | Out-Null

        Invoke-WebRequest `
            -Uri "https://ghfast.top/https://github.com/ActivityWatch/activitywatch/releases/download/v0.12.2/activitywatch-v0.12.2-windows-x86_64.zip" `
            -OutFile $tmp -UseBasicParsing
        Expand-Archive $tmp $awDir -Force

        # 展平单层嵌套
        $subs = Get-ChildItem $awDir -Directory
        if ($subs.Count -eq 1) {
            Get-ChildItem $subs[0].FullName -Force | Move-Item -Destination $awDir -Force
            Remove-Item $subs[0].FullName -Recurse -Force -ErrorAction SilentlyContinue
        }
        Remove-Item $tmp -Force
        Write-Host "ActivityWatch bundled"

    # ── 打包 ZIP ─────────────────────────────────────────────
    - name: Create ZIP
      shell: pwsh
      run: |
        $zip = "dist\$env:DIST_NAME.zip"
        Compress-Archive -Path "$env:DIST_DIR\*" -DestinationPath $zip -CompressionLevel Optimal
        $mb = [math]::Round((Get-Item $zip).Length / 1MB, 0)
        Write-Host "Archive: $zip ($mb MB)"
        "ZIP_PATH=$zip"            >> $env:GITHUB_ENV
        "ZIP_NAME=$env:DIST_NAME.zip" >> $env:GITHUB_ENV

    # ── 上传 Release ─────────────────────────────────────────
    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.TAG }}
        name: "PhysiBot ${{ steps.ver.outputs.VERSION }}"
        body: |
          ## PhysiBot ${{ steps.ver.outputs.VERSION }}

          ### 下载（国内无需梯子）

          ```
          https://ghfast.top/https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.TAG }}/${{ env.ZIP_NAME }}
          ```

          备用：将 `ghfast.top` 换成 `ghproxy.net`

          ### 使用步骤
          1. 解压 ZIP
          2. 双击 `setup.bat` — 填写 API Key 和 QQ 号（只需一次）
          3. 双击 `一键启动.bat` — 以后每次启动

          ### ZIP 包含
          - Python 3.12 嵌入包（免安装）
          - 所有 Python 依赖（离线）
          - ActivityWatch

          ### 首次启动自动下载（通过国内镜像，仅一次）
          - Screenpipe 屏幕感知（约 500MB）
        files: ${{ env.ZIP_PATH }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
